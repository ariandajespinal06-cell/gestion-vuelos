<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Gestión de Vuelos{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; }
        nav {
            background: linear-gradient(135deg, #111111, #2d2d2d);
            padding: 0 30px;
            display: flex;
            align-items: center;
            gap: 28px;
            height: 60px;
            box-shadow: 0 2px 10px rgba(0,0,0,.5);
        }
        nav .brand { color: #fff; font-size: 1.15rem; font-weight: 700; text-decoration: none; }
        nav a { color: #aaaaaa; text-decoration: none; font-size: .92rem; }
        nav a:hover { color: #fff; }
        nav .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        nav .usuario-info { color: #cccccc; font-size: .85rem; }
        nav .usuario-info span { color: #ffffff; font-weight: 700; }
        nav .btn-logout {
            padding: 6px 16px;
            background: #444444;
            color: #ffffff;
            border-radius: 6px;
            text-decoration: none;
            font-size: .85rem;
            font-weight: 600;
        }
        nav .btn-logout:hover { background: #555555; }
        .container { max-width: 1000px; margin: 36px auto; padding: 0 20px; }
        .card { background: #2d2d2d; border-radius: 12px; box-shadow: 0 2px 14px rgba(0,0,0,.4); padding: 32px; margin-bottom: 24px; }
        h1 { color: #ffffff; margin-bottom: 22px; font-size: 1.5rem; }
        .alert { padding: 13px 16px; border-radius: 8px; margin-bottom: 20px; font-size: .9rem; }
        .alert-error   { background: #3d1f1f; border-left: 4px solid #e53e3e; color: #ffaaaa; }
        .alert-success { background: #1f3d2a; border-left: 4px solid #38a169; color: #aaffcc; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .88rem; color: #cccccc; }
        .form-group input,
        .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid #555555; border-radius: 7px; font-size: .95rem; background: #3a3a3a; color: #ffffff; }
        .form-group input:focus,
        .form-group select:focus { outline: none; border-color: #888888; }
        .btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 7px; cursor: pointer; font-size: .93rem; font-weight: 600; text-decoration: none; }
        .btn-primary   { background: #444444; color: #ffffff; }
        .btn-primary:hover { background: #555555; }
        .btn-secondary { background: #333333; color: #cccccc; }
        .btn-sm { padding: 5px 13px; font-size: .82rem; }
        table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        thead th { background: #222222; padding: 12px 15px; text-align: left; font-weight: 700; color: #ffffff; }
        tbody tr { border-bottom: 1px solid #3a3a3a; }
        tbody tr:hover { background: #333333; }
        tbody td { padding: 11px 15px; vertical-align: middle; color: #e0e0e0; }
        .badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: .78rem; font-weight: 700; }
        .badge-admin   { background: #333333; color: #ffffff; }
        .badge-agente  { background: #2d2d2d; color: #cccccc; }
        .badge-cliente { background: #1f1f1f; color: #aaaaaa; }
        .badge-activo  { background: #1f3d2a; color: #aaffcc; }
        .badge-inactivo{ background: #3d1f1f; color: #ffaaaa; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    </style>
</head>
<body>
    <nav>
        <a class="brand" href="/"> Gestión de Vuelos</a>
        <a href="/usuarios">Usuarios</a>
        {% if session.rol == 'admin' %}
        <a href="/usuarios/crear">Nuevo Usuario</a>
        <a href="/reportes">Reportes</a>
        {% endif %}
        <div class="nav-right">
            {% if session.nombre %}
            <span class="usuario-info">
                <span>{{ session.nombre }}</span>
                ({{ session.rol | capitalize }})
            </span>
            <a href="/logout" class="btn-logout">Cerrar Sesión</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block contenido %}{% endblock %}
    </div>
</body>
</html>
