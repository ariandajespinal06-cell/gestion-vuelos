<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — Gestión de Vuelos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #2d2d2d; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.5); padding: 48px 40px; width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 32px; }
        .header .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .header h1 { color: #ffffff; font-size: 1.5rem; margin-bottom: 6px; }
        .header p { color: #aaaaaa; font-size: .9rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .88rem; color: #cccccc; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #555555; border-radius: 8px; font-size: .95rem; background: #3a3a3a; color: #ffffff; }
        .form-group input:focus { outline: none; border-color: #888888; }
        .btn { width: 100%; padding: 12px; background: #444444; color: #ffffff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #555555; }
        .alert-error { background: #3d1f1f; border-left: 4px solid #e53e3e; color: #ffaaaa; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: .9rem; }
        .alert-success { background: #1f3d2a; border-left: 4px solid #38a169; color: #aaffcc; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: .9rem; }
        .links { text-align: center; margin-top: 20px; font-size: .88rem; color: #aaaaaa; }
        .links a { color: #cccccc; text-decoration: none; }
        .links a:hover { color: #ffffff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon">🔑</div>
            <h1>Recuperar Contraseña</h1>
            <p>Te enviaremos un enlace a tu correo</p>
        </div>

        {% if error %}
        <div class="alert-error">{{ error }}</div>
        {% endif %}

        {% if mensaje %}
        <div class="alert-success">{{ mensaje }}</div>
        {% endif %}

        <form method="POST" action="/recuperar">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" name="correo" placeholder="ejemplo@correo.com" required>
            </div>
            <button type="submit" class="btn">Enviar Enlace</button>
        </form>

        <div class="links">
            <p><a href="/login">← Volver al inicio de sesión</a></p>
        </div>
    </div>
</body>
</html>
