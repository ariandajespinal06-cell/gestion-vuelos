<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Gestión de Vuelos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #2d2d2d;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-header .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .login-header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 6px;
        }
        .login-header p {
            color: #aaaaaa;
            font-size: .9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: .88rem;
            color: #cccccc;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #555555;
            border-radius: 8px;
            font-size: .95rem;
            background: #3a3a3a;
            color: #ffffff;
            transition: border .2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #888888;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #444444;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #555555; }
        .alert-error {
            background: #3d1f1f;
            border-left: 4px solid #e53e3e;
            color: #ffaaaa;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: .9rem;
        }
        .rol-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: .75rem;
            font-weight: 700;
            background: #333333;
            color: #cccccc;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">✈️</div>
            <h1>Gestión de Vuelos</h1>
            <p>Ingresa tus credenciales para continuar</p>
        </div>

        {% if error %}
        <div class="alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo"
                       placeholder="ejemplo@correo.com"
                       value="{{ correo if correo else '' }}" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="btn-login">
             Iniciar Sesión
            </button>
        </form>
        <div class="links" style="text-align:center; margin-top:20px; font-size:.88rem; color:#aaaaaa;">
            <p><a href="/recuperar" style="color:#cccccc; text-decoration:none;">¿Olvidaste tu contraseña?</a></p>
            <p style="margin-top:8px;"><a href="/registro" style="color:#cccccc; text-decoration:none;">¿No tienes cuenta? Regístrate</a></p>
        </div>
    </div>
</body>
</html>
